<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chocolate Hills Natural Monument</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <link rel="shortcut icon" href="../logo.png" type="image/svg+xml">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fa;
            margin: 0;
            padding: 0;
        }

        .photo-card {
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 300px; /* Fixed height for the card */
            margin-bottom: 10px; /* Add space between the two cards */
        }

        .photo-card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .photo-card img {
            width: 100%;
            height: 100%; /* Ensure the image fills the entire container */
            object-fit: cover; /* Ensures the image covers the container without stretching */
        }

        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            text-align: center;
            font-weight: bold;
        }

        .navbar {
            margin-bottom: 20px;
        }

        .package-card {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            padding: 20px;
            transition: transform 0.3s ease;
            margin: 20px 0;
        }

        .package-card:hover {
            transform: translateY(-10px);
        }

        .btn {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .btn:hover {
            background-color: #555555;
            transform: translateY(-5px);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
            padding-top: 50px;
        }

        .modal-content {
            background-color: #fff;
            margin: 5% auto;
            padding: 20px;
            border-radius: 12px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            cursor: pointer;
        }

        iframe {
            border: 0;
        }
    </style>
</head>
<body>

    <!-- Gallery Section -->
    <div class="container gallery-container">
        <div class="gallery-title" style="font-family: serif; font-size: 2em;">Chocolate Hills Natural Monument</div>
        <div class="row">
            <!-- Main Image -->
            <div class="col-md-6 mb-4">
                <div class="photo-card">
                    <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/18/12/1e/73/photo0jpg.jpg?w=900&h=500&s=1" alt="Main Resort Image">
                    <div class="photo-overlay">Popular Choice</div>
                </div>
                <br>
                <div class="photo-card">
                    <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/2e/1d/55/5c/caption.jpg?w=900&h=500&s=1" alt="Main Resort Image">
                </div>
            </div>
            
            <!-- Small Images -->
            <div class="col-md-6">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <div class="photo-card">
                            <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/2e/03/d9/5e/caption.jpg?w=900&h=500&s=1" alt="Room View">
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <div class="photo-card">
                            <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/2e/03/d9/5d/caption.jpg?w=900&h=500&s=1" alt="Exterior View">
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <div class="photo-card">
                            <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-s/02/f7/d7/50/chocolate-hills.jpg?w=600&h=400&s=1" alt="Bathroom">
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <div class="photo-card">
                            <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/2b/65/09/ab/e-speciale-perche-sparisce.jpg?w=900&h=500&s=1" alt="Lobby">
                        </div>
                    </div>
                </div>
            </div>
    
            <!-- Additional Images Row -->
            <div class="col-md-4 mb-4">
                <div class="photo-card">
                    <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/1c/58/97/0a/le-colline-di-cioccolato.jpg?w=900&h=500&s=1" alt="Conference Room">
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="photo-card">
                    <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/15/ff/ef/38/img-20190106-100010-largejpg.jpg?w=900&h=500&s=1" alt="Resort View">
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="photo-card">
                    <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/12/a1/91/02/nice-one.jpg?w=900&h=500&s=1" alt="Swimming Pool">
                </div>
            </div>
    
            <!-- Bottom Row -->
            <div class="col-md-6 mb-4">
                <div class="photo-card">
                    <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/10/96/21/a0/chocolate-hills.jpg?w=900&h=500&s=1" alt="Gym">
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="photo-card">
                    <img src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/0e/26/6f/07/img-20170104-074043-709.jpg?w=900&h=-1&s=1" alt="Kids Play Area">
                
                    </div>
                 </div>
             </div>
         </div>


    

    <!-- About Section -->
    <div class="container">
        <div class="package-card">
            <h3>Chocolate Hills Natural Monumen</h3>
            <p>
                Hundreds of domed limestone hills, covered in grass that turns brown in the dry season.
            </p>
        </div>
    </div>

    <!-- Map Section -->
    <div class="container" id="map">
        <h4>Locate Us</h4>
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3931.6131271203017!2d124.16499237479069!3d9.798764690296638!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33aa17d326395253%3A0xba2961146641b9a8!2sChocolate%20Hills%20Natural%20Monument!5e0!3m2!1sen!2sph!4v1731740008440!5m2!1sen!2sph"
            width="100%" height="450"></>
    </div>
    

    <!-- Modal -->
    <div id="priceModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h4>Check Price</h4>
            <form id="priceForm">
                <label for="checkinDate">Check-in Date</label>
                <input type="date" id="checkinDate" required>
                <label for="checkoutDate">Check-out Date</label>
                <input type="date" id="checkoutDate" required>
                <div id="totalPrice"></div>
                <button type="submit" class="btn">Book Now</button>
            </form>
        </div>
    </div>
    <hr>
    <hr>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function closeModal() {
            document.getElementById('priceModal').style.display = 'none';
        }
    </script>
</body>

</html>
