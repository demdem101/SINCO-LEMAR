<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawasan falls</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <link rel="shortcut icon" href="../logo.png" type="image/svg+xml">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fa;
            margin: 0;
            padding: 0;
        }

        .photo-card {
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 300px; /* Fixed height for the card */
            margin-bottom: 10px; /* Add space between the two cards */
        }

        .photo-card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .photo-card img {
            width: 100%;
            height: 100%; /* Ensure the image fills the entire container */
            object-fit: cover; /* Ensures the image covers the container without stretching */
        }

        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            text-align: center;
            font-weight: bold;
        }

        .navbar {
            margin-bottom: 20px;
        }

        .package-card {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            padding: 20px;
            transition: transform 0.3s ease;
            margin: 20px 0;
        }

        .package-card:hover {
            transform: translateY(-10px);
        }

        .btn {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }

        .btn:hover {
            background-color: #555555;
            transform: translateY(-5px);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
            padding-top: 50px;
        }

        .modal-content {
            background-color: #fff;
            margin: 5% auto;
            padding: 20px;
            border-radius: 12px;
            width: 80%;
            max-width: 500px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            cursor: pointer;
        }

        iframe {
            border: 0;
        }
    </style>
</head>
<body>

    <!-- Gallery Section -->
    <div class="container gallery-container">
        <div class="gallery-title" style="font-family: serif; font-size: 2em;">Kawasan fall</div>
        <div class="row">
            <!-- Main Image -->
            <div class="col-md-6 mb-4">
                <div class="photo-card">
                    <img src="https://gttp.images.tshiftcdn.com/321522/x/0/drone-shot-of-kawasan-falls.jpg?ar=1.91%3A1&w=1200&fit=crop" alt="Main Resort Image">
                    <div class="photo-overlay">Popular Choice</div>
                </div>
                <br>
                <div class="photo-card">
                    <img src="https://lh5.googleusercontent.com/p/AF1QipPMCna4RBIQkiHGIhK5qNyBVlbuG6AooDIk9v7G=w243-h174-n-k-no-nu" alt="Main Resort Image">
                </div>
            </div>
            
            <!-- Small Images -->
            <div class="col-md-6">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <div class="photo-card">
                            <img src="https://lh5.googleusercontent.com/p/AF1QipM9fZKm7vRybb2St7qYjJclZYdmx8bopDUpWIQX=w141-h141-n-k-no-nu" alt="Room View">
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <div class="photo-card">
                            <img src="https://lh5.googleusercontent.com/p/AF1QipNWoaY_p7EYHrwI2wZDqfuS4S0hfgNuyiOyQQvx=w141-h101-n-k-no-nu" alt="Exterior View">
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <div class="photo-card">
                            <img src="https://lh3.googleusercontent.com/p/AF1QipPhHrd7V31xGYZrfPGB0z_CX1A0G6VfeM8d3a4v=s1360-w1360-h1020" alt="Bathroom">
                        </div>
                    </div>
                    <div class="col-md-6 mb-4">
                        <div class="photo-card">
                            <img src="https://lh5.googleusercontent.com/p/AF1QipOX9dcGMeO3cThstuu63jooTfnGrnjx_aJuYAEU=w141-h141-n-k-no-nu" alt="Lobby">
                        </div>
                    </div>
                </div>
            </div>
    
            <!-- Additional Images Row -->
            <div class="col-md-4 mb-4">
                <div class="photo-card">
                    <img src="https://lh5.googleusercontent.com/p/AF1QipNKkCPTCY8i0pWcItOibes-nkqLlW5LY9-Ys39X=w141-h101-n-k-no-nu" alt="Conference Room">
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="photo-card">
                    <img src="https://lh5.googleusercontent.com/p/AF1QipOENDnGmkjKmYNx8fI5vtQ_2PktOmBUq_TsSeb5=w141-h118-n-k-no-nu" alt="Resort View">
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="photo-card">
                    <img src="https://lh5.googleusercontent.com/p/AF1QipN3ihOKD3O8ybqr5VR7Q92vDw2UlkL-76ovXvCA=w141-h101-n-k-no-nu" alt="Swimming Pool">
                </div>
            </div>
    
            <!-- Bottom Row -->
            <div class="col-md-6 mb-4">
                <div class="photo-card">
                    <img src="https://lh3.googleusercontent.com/p/AF1QipM4NLOv_Q3gus_5SlSqdgxbtM92UHxPj_D0Wd7U=s1360-w1360-h1020" alt="Gym">
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="photo-card">
                    <img src="https://lh3.googleusercontent.com/p/AF1QipPHf6wUVruNBisgwH-SrBjFXqtZHT3jSO9jgJP8=s1360-w1360-h1020" alt="Kids Play Area">
                    
                    </div>
                 </div>
             </div>
         </div>


    

    <!-- About Section -->
    <div class="container">
        <div class="package-card">
            <h3>Kawasan fall</h3>
            <p>
                Explore different ways to experience this place.
            </p>
        </div>
    </div>

    <!-- Map Section -->
    <div class="container" id="map">
        <h4>Locate Us</h4>
        <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3931.556986697711!2d123.37175657479077!3d9.803500690292099!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x33abc071985da1cd%3A0x357899ef7e6324cf!2sKawasan%20Falls!5e0!3m2!1sen!2sph!4v1731747373358!5m2!1sen!2sph"
            width="100%" height="450"></iframe>
    </div>
    

    <!-- Modal -->
    <div id="priceModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h4>Check Price</h4>
            <form id="priceForm">
                <label for="checkinDate">Check-in Date</label>
                <input type="date" id="checkinDate" required>
                <label for="checkoutDate">Check-out Date</label>
                <input type="date" id="checkoutDate" required>
                <div id="totalPrice"></div>
                <button type="submit" class="btn">Book Now</button>
            </form>
        </div>
    </div>
    <hr>
    <hr>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function closeModal() {
            document.getElementById('priceModal').style.display = 'none';
        }
    </script>
</body>

</html>
